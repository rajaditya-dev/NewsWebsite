<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily News</title>
  <link rel="icon" type="image/jpeg" href="/assets/original-a678c52db910438d85ecfca032fb7cb4.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,700;6..72,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #17120f;
      --muted: #6d625a;
      --paper: #f4efe6;
      --panel: #fffaf1;
      --panel-strong: #efe3d2;
      --brand: #9b1c20;
      --brand-dark: #3a1115;
      --gold: #d09b3c;
      --line: rgba(23, 18, 15, 0.16);
      --shadow: 0 22px 60px rgba(42, 25, 11, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      background:
        radial-gradient(circle at 10% 0%, rgba(208, 155, 60, 0.18), transparent 28rem),
        linear-gradient(135deg, rgba(155, 28, 32, 0.08), transparent 32rem),
        var(--paper);
      color: var(--ink);
      overflow-x: hidden;
    }

    body.dark {
      --ink: #f8efe2;
      --muted: #cdbfaf;
      --paper: #130f0d;
      --panel: #211815;
      --panel-strong: #2d211c;
      --line: rgba(255, 250, 241, 0.16);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
    }

    a {
      color: inherit;
    }

    .site-shell {
      min-height: 100vh;
    }

    .magazine-header {
      position: relative;
      isolation: isolate;
      padding: 1.15rem clamp(1rem, 4vw, 4rem) 2.8rem;
      color: #fffaf1;
      background:
        linear-gradient(rgba(32, 12, 15, 0.68), rgba(32, 12, 15, 0.9)),
        url("https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=1800&q=80") center/cover;
      box-shadow: var(--shadow);
    }

    .magazine-header::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 8px;
      background: linear-gradient(90deg, var(--brand), var(--gold), var(--brand));
      z-index: -1;
    }

    .header-tools {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
      gap: 1rem;
    }

    .datetime-panel {
      justify-self: start;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      max-width: 270px;
      padding: 0.65rem 0.8rem;
      border: 1px solid rgba(255, 250, 241, 0.2);
      border-radius: 999px;
      background: rgba(255, 250, 241, 0.12);
      backdrop-filter: blur(10px);
    }

    .datetime-label {
      color: rgba(255, 250, 241, 0.7);
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .datetime-value {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      line-height: 1.1;
    }

    .datetime-time {
      font-weight: 800;
      font-size: 0.98rem;
    }

    .datetime-date {
      color: rgba(255, 250, 241, 0.78);
      font-size: 0.75rem;
    }

    .masthead {
      justify-self: center;
      text-align: center;
    }

    .kicker {
      margin: 0 0 0.25rem;
      color: var(--gold);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .masthead h1 {
      margin: 0;
      font-family: "Newsreader", serif;
      font-size: clamp(3rem, 8vw, 7rem);
      line-height: 0.86;
      letter-spacing: -0.08em;
      text-transform: uppercase;
    }

    .masthead p {
      margin: 0.75rem auto 0;
      max-width: 560px;
      color: rgba(255, 250, 241, 0.78);
      font-size: clamp(0.9rem, 2vw, 1rem);
    }

    #toggle-mode {
      justify-self: end;
      border: 1px solid rgba(255, 250, 241, 0.45);
      border-radius: 999px;
      padding: 0.7rem 1rem;
      color: #fffaf1;
      background: rgba(255, 250, 241, 0.1);
      cursor: pointer;
      font-weight: 800;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    #toggle-mode:hover {
      transform: translateY(-2px);
      background: rgba(255, 250, 241, 0.18);
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      gap: 0.25rem;
      padding: 0.7rem clamp(0.75rem, 4vw, 4rem);
      border-bottom: 1px solid var(--line);
      background: rgba(244, 239, 230, 0.88);
      backdrop-filter: blur(18px);
    }

    .dark nav {
      background: rgba(19, 15, 13, 0.88);
    }

    nav a {
      border-radius: 999px;
      padding: 0.68rem 1rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      transition: background 0.2s ease, color 0.2s ease;
    }

    nav a:hover,
    nav a.active {
      color: #fffaf1;
      background: var(--brand);
    }

    .control-deck {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 0.75rem;
      width: min(1180px, calc(100% - 2rem));
      margin: 1.35rem auto 2rem;
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      box-shadow: var(--shadow);
      position: relative;
      z-index: 5;
    }

    #search-input,
    #language-select,
    #search-btn {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 16px;
      font: inherit;
    }

    #search-input {
      min-width: 0;
      padding: 0 1rem;
      color: var(--ink);
      background: var(--paper);
    }

    #language-select {
      padding: 0 1rem;
      color: var(--ink);
      background: var(--paper);
      cursor: pointer;
    }

    #search-btn {
      padding: 0 1.25rem;
      border: none;
      color: #fffaf1;
      background: var(--brand);
      cursor: pointer;
      font-weight: 800;
    }

    .hero-section {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(280px, 0.75fr);
      gap: 1.5rem;
      width: min(1180px, calc(100% - 2rem));
      margin: 0 auto 2rem;
    }

    .hero-card,
    .side-rail,
    .news-article {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .hero-card {
      min-height: 560px;
      display: grid;
      align-items: end;
      overflow: hidden;
      border-radius: 34px;
      position: relative;
      color: #fffaf1;
      background: var(--brand-dark);
    }

    .hero-card img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.95) contrast(1.05);
      transform: scale(1.02);
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 12%, rgba(0, 0, 0, 0.28) 48%, rgba(0, 0, 0, 0.9));
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 760px;
      padding: clamp(1.4rem, 4vw, 2.5rem);
    }

    .tag {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      padding: 0.38rem 0.75rem;
      color: #fffaf1;
      background: var(--brand);
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .hero-content h2 {
      margin: 0.75rem 0;
      font-family: "Newsreader", serif;
      font-size: clamp(2.5rem, 6vw, 5.6rem);
      line-height: 0.88;
      letter-spacing: -0.08em;
    }

    .hero-content p {
      max-width: 680px;
      color: rgba(255, 250, 241, 0.82);
      font-size: 1.05rem;
      line-height: 1.65;
    }

    .read-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.75rem;
      color: inherit;
      text-decoration: none;
      font-weight: 900;
    }

    .side-rail {
      border-radius: 28px;
      padding: 1.2rem;
    }

    .section-title {
      margin: 0 0 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.8rem;
      color: var(--brand);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .section-title::after {
      content: "";
      height: 1px;
      flex: 1;
      background: var(--line);
    }

    .side-story {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 1rem;
      padding: 1rem 0;
      border-top: 1px solid var(--line);
    }

    .side-story:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .side-story img {
      width: 96px;
      height: 96px;
      object-fit: cover;
      border-radius: 18px;
    }

    .side-story h3 {
      margin: 0.35rem 0 0;
      font-family: "Newsreader", serif;
      font-size: 1.25rem;
      line-height: 1.05;
    }

    .meta {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    main#news-container {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1.35rem;
      width: min(1180px, calc(100% - 2rem));
      margin: 0 auto 3rem;
    }

    .news-article {
      overflow: hidden;
      border-radius: 28px;
      transition: transform 0.24s ease, box-shadow 0.24s ease;
    }

    .news-article:hover {
      transform: translateY(-8px);
    }

    .news-article img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
    }

    .news-content {
      padding: 1.25rem;
    }

    .news-content h3 {
      margin: 0.65rem 0;
      font-family: "Newsreader", serif;
      font-size: 1.8rem;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .news-content p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .truncate {
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .empty-state {
      grid-column: 1 / -1;
      padding: 3rem;
      border: 1px dashed var(--line);
      border-radius: 28px;
      text-align: center;
      background: var(--panel);
      color: var(--muted);
    }

    footer {
      padding: 2.5rem 1rem;
      color: #fffaf1;
      text-align: center;
      background: var(--brand-dark);
    }

    footer p {
      margin: 0.35rem 0;
      color: rgba(255, 250, 241, 0.76);
    }

    @media (max-width: 980px) {
      .header-tools,
      .hero-section {
        grid-template-columns: 1fr;
      }

      .masthead {
        order: 2;
      }

      #toggle-mode {
        position: absolute;
        top: 1rem;
        right: 1rem;
      }

      .hero-card {
        min-height: 460px;
      }

      main#news-container {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .magazine-header {
        padding: 0.9rem 0.8rem 2.4rem;
      }

      .datetime-panel {
        max-width: 180px;
        gap: 0.45rem;
        padding: 0.48rem 0.6rem;
      }

      .datetime-label {
        display: none;
      }

      .datetime-time {
        font-size: 0.82rem;
      }

      .datetime-date {
        font-size: 0.62rem;
      }

      #toggle-mode {
        padding: 0.55rem 0.7rem;
        font-size: 0.78rem;
      }

      nav {
        justify-content: flex-start;
        overflow-x: auto;
      }

      nav::-webkit-scrollbar {
        display: none;
      }

      .control-deck {
        grid-template-columns: 1fr;
        margin-top: 1rem;
      }

      .hero-card {
        min-height: 440px;
        border-radius: 26px;
      }

      .side-story {
        grid-template-columns: 82px 1fr;
      }

      .side-story img {
        width: 82px;
        height: 82px;
      }

      main#news-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <header class="magazine-header">
      <div class="header-tools">
        <div class="datetime-panel" aria-live="polite">
          <div class="datetime-label">Live Update</div>
          <div class="datetime-value">
            <span class="datetime-time" id="current-time">--:--:--</span>
            <span class="datetime-date" id="current-date">Loading date...</span>
          </div>
        </div>
        <div class="masthead">
          <!-- <p class="kicker">Independent digital magazine</p> -->
          <h1>NEWS THRONE</h1>
          <!-- <p>Sharp headlines, cinematic stories, and the latest updates across India, world affairs, culture, sports, and technology.</p> -->
        </div>
        <button id="toggle-mode" type="button">Dark Mode</button>
      </div>
    </header>

    <nav aria-label="News categories">
      <a href="#" data-category="India">India</a>
      <a href="#" data-category="Politics">Politics</a>
      <a href="#" data-category="Technology">Technology</a>
      <a href="#" data-category="World">World</a>
      <a href="#" data-category="Sports">Sports</a>
      <a href="#" data-category="Entertainment">Entertainment</a>
      <a href="/admin.html">Admin Portal</a>
    </nav>

    <section class="control-deck" aria-label="Search and filter news">
      <input type="text" id="search-input" placeholder="Search stories, people, places...">
      <select id="language-select">
        <option value="en" selected>English</option>
        <option value="hi">Hindi</option>
      </select>
      <button id="search-btn" type="button">Search</button>
    </section>

    <section class="hero-section" id="hero-section" aria-label="Featured stories"></section>

    <main id="news-container" aria-live="polite">
      <div class="empty-state">Loading news...</div>
    </main>

    <footer>
      <p>&copy; 2026 Daily News | All Rights Reserved</p>
      <p>Contact: support@dailynews.com | +91-5567234127</p>
      <p>Built for fast, bilingual digital publishing.</p>
    </footer>
  </div>

  <script>
    const heroSection = document.getElementById('hero-section');
    const container = document.getElementById('news-container');
    const searchInput = document.getElementById('search-input');
    const languageSelect = document.getElementById('language-select');
    const toggleBtn = document.getElementById('toggle-mode');
    const placeholderImage = 'https://images.unsplash.com/photo-1495020689067-958852a7765e?auto=format&fit=crop&w=1200&q=80';
    let selectedCategory = '';

    function escapeHTML(value = '') {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getImage(news) {
      return news.image ? escapeHTML(news.image) : placeholderImage;
    }

    function formatDate(date) {
      if (!date) return 'Date unavailable';
      return new Date(date).toLocaleDateString([], {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
    }

    function getExcerpt(content = '', length = 170) {
      const plainText = String(content).replace(/\s+/g, ' ').trim();
      return plainText.length > length ? `${plainText.slice(0, length)}...` : plainText;
    }

    function renderHero(newsList) {
      const lead = newsList[0];
      const sideStories = newsList.slice(1, 4);

      if (!lead) {
        heroSection.innerHTML = '';
        return;
      }

      heroSection.innerHTML = `
        <article class="hero-card">
          <img src="${getImage(lead)}" alt="${escapeHTML(lead.title || 'Featured news image')}">
          <div class="hero-content">
            <span class="tag">${escapeHTML(lead.category || 'Top Story')}</span>
            <h2>${escapeHTML(lead.title || 'Untitled Story')}</h2>
            <div class="meta">By ${escapeHTML(lead.author || 'Daily News Desk')} | ${formatDate(lead.date)}</div>
            <p>${escapeHTML(getExcerpt(lead.content, 230))}</p>
            <a class="read-link" href="article.html?id=${encodeURIComponent(lead._id)}">Read the full feature -></a>
          </div>
        </article>
        <aside class="side-rail">
          <h2 class="section-title">Editor&apos;s Picks</h2>
          ${sideStories.map(story => `
            <article class="side-story">
              <img src="${getImage(story)}" alt="${escapeHTML(story.title || 'News image')}">
              <div>
                <span class="tag">${escapeHTML(story.category || 'News')}</span>
                <h3>${escapeHTML(story.title || 'Untitled Story')}</h3>
                <div class="meta">${formatDate(story.date)}</div>
                <a class="read-link" href="article.html?id=${encodeURIComponent(story._id)}">Open story -></a>
              </div>
            </article>
          `).join('')}
        </aside>
      `;
    }

    function renderCards(newsList) {
      const stories = newsList.slice(4);
      const cardStories = stories.length ? stories : newsList.slice(1);

      if (!cardStories.length) {
        container.innerHTML = '<div class="empty-state">No additional stories yet. Add more articles from the admin portal.</div>';
        return;
      }

      container.innerHTML = cardStories.map(news => `
        <article class="news-article">
          <img src="${getImage(news)}" alt="${escapeHTML(news.title || 'News image')}">
          <div class="news-content">
            <span class="tag">${escapeHTML(news.category || 'News')}</span>
            <h3>${escapeHTML(news.title || 'Untitled Story')}</h3>
            <div class="meta">By ${escapeHTML(news.author || 'Daily News Desk')} | ${formatDate(news.date)}</div>
            <p class="truncate">${escapeHTML(getExcerpt(news.content, 180))}</p>
            <a class="read-link" href="article.html?id=${encodeURIComponent(news._id)}">Read More -></a>
          </div>
        </article>
      `).join('');
    }

    async function fetchNews(query = '', lang = 'en', category = '') {
      heroSection.innerHTML = '';
      container.innerHTML = '<div class="empty-state">Loading the newsroom...</div>';

      try {
        const url = new URL('/api/news', window.location.origin);
        if (lang) url.searchParams.append('language', lang);
        if (query) url.searchParams.append('query', query);
        if (category) url.searchParams.append('category', category);

        const response = await fetch(url);
        const data = await response.json();

        if (!Array.isArray(data) || data.length === 0) {
          container.innerHTML = '<div class="empty-state">No matching news found. Try another search or category.</div>';
          return;
        }

        renderHero(data);
        renderCards(data);
      } catch (error) {
        console.error('Fetch error:', error);
        container.innerHTML = '<div class="empty-state">Failed to load news. Try again later.</div>';
      }
    }

    function updateDateTime() {
      const now = new Date();
      document.getElementById('current-time').textContent = now.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      document.getElementById('current-date').textContent = now.toLocaleDateString([], {
        weekday: 'short',
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
    }

    function triggerSearch() {
      fetchNews(searchInput.value.trim(), languageSelect.value, selectedCategory);
    }

    document.getElementById('search-btn').addEventListener('click', triggerSearch);
    languageSelect.addEventListener('change', triggerSearch);
    searchInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') triggerSearch();
    });

    document.querySelectorAll('nav a[data-category]').forEach(link => {
      link.addEventListener('click', (event) => {
        event.preventDefault();
        selectedCategory = link.getAttribute('data-category');
        document.querySelectorAll('nav a[data-category]').forEach(item => item.classList.remove('active'));
        link.classList.add('active');
        triggerSearch();
      });
    });

    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      toggleBtn.textContent = document.body.classList.contains('dark') ? 'Light Mode' : 'Dark Mode';
    });

    updateDateTime();
    setInterval(updateDateTime, 1000);
    fetchNews();
  </script>
</body>
</html>
